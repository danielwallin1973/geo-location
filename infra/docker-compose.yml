services:
  postgis:
    # imresamu/postgis publicerar multi-arch (inkl. arm64) – funkar nativt på Apple Silicon.
    image: imresamu/postgis:16-3.4
    container_name: geo-audio-postgis
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geoaudio
    ports:
      - "5432:5432"
    volumes:
      - geo-audio-pgdata:/var/lib/postgresql/data
      - ./postgis/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geoaudio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  geo-audio-pgdata:
